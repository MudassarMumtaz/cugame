<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 16px 4px rgba(168, 218, 220, 0.4);
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 1rem;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover { opacity: 0.85; }

    #restart {
      background: #e94560;
      color: #fff;
    }

    #toggle-mode {
      background: #0f3460;
      color: #a8dadc;
      border: 1px solid #a8dadc;
    }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { color: #eee; font-weight: bold; }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>
  <div id="status">X's turn</div>
  <div id="board"></div>
  <div id="controls">
    <button id="restart">Restart</button>
    <button id="toggle-mode">vs Computer</button>
  </div>
  <div id="score">
    <div>X wins: <span id="score-x">0</span></div>
    <div>Draws: <span id="score-d">0</span></div>
    <div>O wins: <span id="score-o">0</span></div>
  </div>

  <script>
    const boardEl = document.getElementById('board');
    const statusEl = document.getElementById('status');
    const toggleBtn = document.getElementById('toggle-mode');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreD = document.getElementById('score-d');

    let board, current, gameOver, vsComputer;
    let scores = { X: 0, O: 0, D: 0 };
    vsComputer = false;

    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function init() {
      board = Array(9).fill('');
      current = 'X';
      gameOver = false;
      render();
      statusEl.textContent = "X's turn";
    }

    function render() {
      boardEl.innerHTML = '';
      board.forEach((val, i) => {
        const cell = document.createElement('div');
        cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
        cell.textContent = val;
        cell.addEventListener('click', () => handleClick(i));
        boardEl.appendChild(cell);
      });
    }

    function handleClick(i) {
      if (gameOver || board[i]) return;
      if (vsComputer && current === 'O') return;
      makeMove(i);
      if (vsComputer && !gameOver) {
        setTimeout(computerMove, 300);
      }
    }

    function makeMove(i) {
      board[i] = current;
      const win = checkWin();
      render();
      if (win) {
        highlight(win);
        statusEl.textContent = `${current} wins!`;
        scores[current]++;
        updateScore();
        gameOver = true;
      } else if (board.every(c => c)) {
        statusEl.textContent = "It's a draw!";
        scores.D++;
        updateScore();
        gameOver = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        statusEl.textContent = `${current}'s turn${vsComputer && current === 'O' ? ' (thinking...)' : ''}`;
      }
    }

    function checkWin() {
      return WINS.find(([a,b,c]) => board[a] && board[a] === board[b] && board[b] === board[c]) || null;
    }

    function highlight(combo) {
      const cells = boardEl.querySelectorAll('.cell');
      combo.forEach(i => cells[i].classList.add('win'));
    }

    function updateScore() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreD.textContent = scores.D;
    }

    // Minimax AI
    function computerMove() {
      const move = bestMove();
      makeMove(move);
    }

    function bestMove() {
      let best = -Infinity, idx = -1;
      board.forEach((val, i) => {
        if (!val) {
          board[i] = 'O';
          const score = minimax(board, 0, false);
          board[i] = '';
          if (score > best) { best = score; idx = i; }
        }
      });
      return idx;
    }

    function minimax(b, depth, isMax) {
      const win = WINS.find(([a,c,d]) => b[a] && b[a] === b[c] && b[c] === b[d]);
      if (win) return isMax ? -10 + depth : 10 - depth;
      if (b.every(c => c)) return 0;

      if (isMax) {
        let best = -Infinity;
        b.forEach((val, i) => {
          if (!val) {
            b[i] = 'O';
            best = Math.max(best, minimax(b, depth + 1, false));
            b[i] = '';
          }
        });
        return best;
      } else {
        let best = Infinity;
        b.forEach((val, i) => {
          if (!val) {
            b[i] = 'X';
            best = Math.min(best, minimax(b, depth + 1, true));
            b[i] = '';
          }
        });
        return best;
      }
    }

    document.getElementById('restart').addEventListener('click', init);

    toggleBtn.addEventListener('click', () => {
      vsComputer = !vsComputer;
      toggleBtn.textContent = vsComputer ? 'vs Human' : 'vs Computer';
      scores = { X: 0, O: 0, D: 0 };
      updateScore();
      init();
    });

    init();
  </script>
</body>
</html>
